<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Targets - Fitness Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200">
    <div class="min-h-screen">
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-md">
            <div class="flex-1">
                <a href="index.html" class="btn btn-ghost text-xl">💪 Fitness Evaluator</a>
            </div>
            <div class="flex-none">
                <a href="index.html" class="btn btn-ghost">← Back to Dashboard</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container mx-auto p-4 max-w-4xl">
            <h1 class="text-4xl font-bold mb-6">🎯 Plan Targets</h1>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Target Form -->
                <div class="lg:col-span-2">
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title">Create New Target</h2>
                            
                            <form id="target-form" class="space-y-4">
                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Target Week (Monday)</span>
                                    </label>
                                    <input type="date" id="target-week" class="input input-bordered" required />
                                </div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Target Name</span>
                                    </label>
                                    <input type="text" id="target-name" class="input input-bordered" placeholder="e.g., Weekly Calorie Goal" required />
                                </div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Category</span>
                                    </label>
                                    <select id="target-category" class="select select-bordered" required>
                                        <option value="">Select a category...</option>
                                        <option value="nutrition">🍎 Nutrition</option>
                                        <option value="training">💪 Training</option>
                                        <option value="recovery">😴 Recovery</option>
                                        <option value="body_composition">📏 Body Composition</option>
                                        <option value="performance">⚡ Performance</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Target Value</span>
                                        </label>
                                        <input type="number" id="target-value" class="input input-bordered" placeholder="2000" step="0.1" required />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Unit</span>
                                        </label>
                                        <input type="text" id="target-unit" class="input input-bordered" placeholder="kcal, lbs, hours, %" required />
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Minimum Value</span>
                                        </label>
                                        <input type="number" id="min-value" class="input input-bordered" step="0.1" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Maximum Value</span>
                                        </label>
                                        <input type="number" id="max-value" class="input input-bordered" step="0.1" />
                                    </div>
                                </div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Description</span>
                                    </label>
                                    <textarea id="target-description" class="textarea textarea-bordered" placeholder="What does this target measure?"></textarea>
                                </div>

                                <div class="form-control mt-6">
                                    <button type="submit" class="btn btn-primary">Create Target</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Targets List -->
                <div class="lg:col-span-1">
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title text-lg">Active Targets</h2>
                            <div id="targets-list" class="space-y-2">
                                <p class="text-base-content/60 text-sm">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Target Categories -->
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title text-lg">By Category</h2>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between">
                                    <span>🍎 Nutrition</span>
                                    <span class="font-bold" id="cat-nutrition">0</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>💪 Training</span>
                                    <span class="font-bold" id="cat-training">0</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>😴 Recovery</span>
                                    <span class="font-bold" id="cat-recovery">0</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>📏 Body Comp</span>
                                    <span class="font-bold" id="cat-body">0</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>⚡ Performance</span>
                                    <span class="font-bold" id="cat-perf">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>

        function initPage() {
            // Set this week's date
            const weekStart = getWeekStart();
            document.getElementById('target-week').value = formatDate(weekStart);

            // Form submission
            document.getElementById('target-form').addEventListener('submit', createTarget);

            // Load targets
            loadTargets();
        }

        async function createTarget(e) {
            e.preventDefault();

            try {
                const targetData = {
                    // Map form fields into backend schema defined in PlanTargetsCreate
                    effective_from: document.getElementById('target-week').value,
                    target_calories: document.getElementById('target-category').value === 'nutrition'
                        ? parseFloat(document.getElementById('target-value').value) || null
                        : null,
                    target_protein_g: document.getElementById('target-name').value.toLowerCase().includes('protein')
                        ? parseFloat(document.getElementById('target-value').value) || null
                        : null,
                    target_fasting_hrs: document.getElementById('target-name').value.toLowerCase().includes('fast')
                        ? parseFloat(document.getElementById('target-value').value) || null
                        : null,
                    target_run_km_wk: document.getElementById('target-category').value === 'performance'
                        ? parseFloat(document.getElementById('target-value').value) || null
                        : null,
                    target_strength_sessions: document.getElementById('target-category').value === 'training'
                        ? parseInt(document.getElementById('target-value').value) || null
                        : null,
                    target_weight_kg: document.getElementById('target-name').value.toLowerCase().includes('weight')
                        ? parseFloat(document.getElementById('target-value').value) || null
                        : null,
                    notes: document.getElementById('target-description').value || null
                };

                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = true;
                button.textContent = 'Creating...';

                await api.createPlanTarget(targetData);
                showSuccess('Target created successfully!');

                // Reset form
                document.getElementById('target-form').reset();
                const weekStart = getWeekStart();
                document.getElementById('target-week').value = formatDate(weekStart);

                // Reload targets
                await loadTargets();

                button.disabled = false;
                button.textContent = 'Create Target';
            } catch (error) {
                showError(error);
                e.target.querySelector('button[type="submit"]').disabled = false;
            }
        }

        async function loadTargets() {
            try {
                const targets = await api.listPlanTargets();
                const listDiv = document.getElementById('targets-list');

                if (targets.length === 0) {
                    listDiv.innerHTML = '<p class="text-base-content/60 text-sm">No targets yet</p>';
                    return;
                }

                // Use the most recent targets entry
                const latest = targets[0];

                const metrics = [];
                if (latest.target_calories != null) {
                    metrics.push({ label: 'Daily Calories', value: `${latest.target_calories} kcal`, category: 'nutrition' });
                }
                if (latest.target_protein_g != null) {
                    metrics.push({ label: 'Daily Protein', value: `${latest.target_protein_g} g`, category: 'nutrition' });
                }
                if (latest.target_fasting_hrs != null) {
                    metrics.push({ label: 'Fasting Window', value: `${latest.target_fasting_hrs} hrs`, category: 'recovery' });
                }
                if (latest.target_run_km_wk != null) {
                    metrics.push({ label: 'Weekly Run Distance', value: `${latest.target_run_km_wk} km`, category: 'performance' });
                }
                if (latest.target_strength_sessions != null) {
                    metrics.push({ label: 'Strength Sessions / Week', value: `${latest.target_strength_sessions}`, category: 'training' });
                }
                if (latest.target_weight_kg != null) {
                    metrics.push({ label: 'Target Weight', value: `${latest.target_weight_kg} kg`, category: 'body_composition' });
                }

                if (metrics.length === 0 && !latest.notes) {
                    listDiv.innerHTML = '<p class="text-base-content/60 text-sm">Targets record has no numeric goals set yet.</p>';
                    return;
                }

                const icons = {
                    nutrition: '🍎',
                    training: '💪',
                    recovery: '😴',
                    body_composition: '📏',
                    performance: '⚡'
                };

                listDiv.innerHTML = `
                    <div class="bg-base-200 p-3 rounded-lg">
                        <div class="font-semibold text-sm">Effective from ${latest.effective_from}</div>
                        <div class="text-xs text-base-content/70 mt-2 space-y-1">
                            ${metrics.map(m => `
                                <div>${icons[m.category] || '📌'} ${m.label}: ${m.value}</div>
                            `).join('')}
                            ${latest.notes ? `<div class="mt-2 italic">Notes: ${latest.notes}</div>` : ''}
                        </div>
                    </div>
                `;

                // Update category counts based on which metric types are present
                document.getElementById('cat-nutrition').textContent =
                    (latest.target_calories != null || latest.target_protein_g != null) ? 1 : 0;
                document.getElementById('cat-training').textContent =
                    latest.target_strength_sessions != null ? 1 : 0;
                document.getElementById('cat-recovery').textContent =
                    latest.target_fasting_hrs != null ? 1 : 0;
                document.getElementById('cat-body').textContent =
                    latest.target_weight_kg != null ? 1 : 0;
                document.getElementById('cat-perf').textContent =
                    latest.target_run_km_wk != null ? 1 : 0;
            } catch (error) {
                console.error('Error loading targets:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
