<!DOCTYPE html>
<html lang="en" data-theme="light" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach Chat - Fitness Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Design Tokens -->
    <link rel="stylesheet" href="css/design-tokens.css">

    <!-- Navigation Sidebar Styles -->
    <link rel="stylesheet" href="css/navigation-sidebar.css">

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>

<body class="bg-base-200 h-full">
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-to-main">Skip to main content</a>

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content h-screen flex flex-col">
        <div class="flex flex-col h-full overflow-hidden">
            <!-- Header -->
            <div class="flex-shrink-0 p-6 pb-4 border-b border-base-300">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-4xl font-bold">💬 AI Coach</h1>
                        <p class="text-base-content/70 mt-2">Your personal fitness and nutrition coach</p>
                    </div>
                    <button id="new-session-btn" class="btn btn-outline gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                        </svg>
                        New Chat
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Chat Sessions Sidebar (Desktop) -->
                <div id="sessions-sidebar" class="hidden lg:flex flex-col w-64 border-r border-base-300 bg-base-100 overflow-hidden">
                    <div class="p-4 border-b border-base-300">
                        <h2 class="font-semibold">Chat History</h2>
                    </div>
                    <div id="sessions-list" class="flex-1 overflow-y-auto p-2">
                        <!-- Sessions will be rendered here -->
                    </div>
                </div>

                <!-- Main Chat Area -->
                <div class="flex-1 flex flex-col overflow-hidden">
                    <!-- Messages Container -->
                    <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4">
                        <!-- Welcome message -->
                        <div class="flex justify-center items-center h-full" id="welcome-message">
                            <div class="text-center max-w-2xl">
                                <div class="text-6xl mb-4">🏋️</div>
                                <h2 class="text-2xl font-bold mb-2">Welcome to Your AI Coach!</h2>
                                <p class="text-base-content/70 mb-6">
                                    I'm here to help you with fitness goals, nutrition advice, workout planning, and more.
                                    Ask me anything!
                                </p>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-left">
                                    <button class="btn btn-outline justify-start" onclick="coachChat.sendSuggestion('I want to set a new fitness goal')">
                                        🎯 Set a fitness goal
                                    </button>
                                    <button class="btn btn-outline justify-start" onclick="coachChat.sendSuggestion('How am I progressing with my training?')">
                                        📊 Check my progress
                                    </button>
                                    <button class="btn btn-outline justify-start" onclick="coachChat.sendSuggestion('Give me nutrition advice')">
                                        🥗 Get nutrition advice
                                    </button>
                                    <button class="btn btn-outline justify-start" onclick="coachChat.sendSuggestion('Suggest a workout plan')">
                                        💪 Plan a workout
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- Chat messages will be rendered here -->
                    </div>

                    <!-- Input Area -->
                    <div class="flex-shrink-0 p-4 border-t border-base-300 bg-base-100">
                        <form id="chat-form" class="flex gap-2">
                            <textarea
                                id="message-input"
                                placeholder="Ask your coach anything... (Press Enter to send, Shift+Enter for new line)"
                                class="textarea textarea-bordered flex-1 resize-none"
                                rows="1"
                                maxlength="2000"
                            ></textarea>
                            <button type="submit" id="send-btn" class="btn btn-primary gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                                </svg>
                                Send
                            </button>
                        </form>
                        <div class="text-xs text-base-content/50 mt-2">
                            Powered by AI • Responses may take a few seconds
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>

    <!-- Navigation Sidebar Script -->
    <script src="js/navigation-sidebar.js"></script>

    <!-- Coach Chat Script -->
    <script src="js/coach-chat.js"></script>

    <script>
        let coachChat;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize sidebar
            const sidebar = new NavigationSidebar('sidebar-container');

            // Initialize coach chat
            coachChat = new CoachChat();
            await coachChat.init();
        });
    </script>
</body>

</html>
