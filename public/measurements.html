<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Measurements - Fitness Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200">
    <div class="min-h-screen">
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-md">
            <div class="flex-1">
                <a href="index.html" class="btn btn-ghost text-xl">💪 Fitness Evaluator</a>
            </div>
            <div class="flex-none">
                <a href="index.html" class="btn btn-ghost">← Back to Dashboard</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container mx-auto p-4 max-w-4xl">
            <h1 class="text-4xl font-bold mb-6">📊 Weekly Measurements</h1>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Measurement Form -->
                <div class="lg:col-span-2">
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title">Record This Week's Metrics</h2>
                            
                            <form id="measurement-form" class="space-y-4">
                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Week Starting (Monday)</span>
                                    </label>
                                    <input type="date" id="measurement-week" class="input input-bordered" required />
                                </div>

                                <div class="divider">Body Metrics</div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Weight</span>
                                            <span class="label-text-alt">lbs</span>
                                        </label>
                                        <input type="number" id="weight" class="input input-bordered" placeholder="185" step="0.1" min="0" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Body Fat %</span>
                                        </label>
                                        <input type="number" id="body-fat-percent" class="input input-bordered" placeholder="18.5" step="0.1" min="0" max="100" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Chest</span>
                                            <span class="label-text-alt">in</span>
                                        </label>
                                        <input type="number" id="chest" class="input input-bordered" step="0.1" min="0" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Waist</span>
                                            <span class="label-text-alt">in</span>
                                        </label>
                                        <input type="number" id="waist" class="input input-bordered" step="0.1" min="0" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Hips</span>
                                            <span class="label-text-alt">in</span>
                                        </label>
                                        <input type="number" id="hips" class="input input-bordered" step="0.1" min="0" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Thigh</span>
                                            <span class="label-text-alt">in</span>
                                        </label>
                                        <input type="number" id="thigh" class="input input-bordered" step="0.1" min="0" />
                                    </div>
                                </div>

                                <div class="divider">Recovery & Wellness</div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Resting Heart Rate</span>
                                            <span class="label-text-alt">bpm</span>
                                        </label>
                                        <input type="number" id="resting-hr" class="input input-bordered" placeholder="60" min="30" max="120" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Avg Sleep</span>
                                            <span class="label-text-alt">hrs</span>
                                        </label>
                                        <input type="number" id="avg-sleep" class="input input-bordered" placeholder="7.5" step="0.5" min="0" max="12" />
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Avg Energy</span>
                                            <span class="label-text-alt">1-10</span>
                                        </label>
                                        <input type="range" id="avg-energy" min="1" max="10" class="range" />
                                        <div class="flex justify-between text-xs px-2">
                                            <span>1</span>
                                            <span id="energy-display" class="font-bold">5</span>
                                            <span>10</span>
                                        </div>
                                    </div>

                                    <div class="form-control">
                                        <label class="label">
                                            <span class="label-text font-semibold">Sleep Quality</span>
                                            <span class="label-text-alt">1-10</span>
                                        </label>
                                        <input type="range" id="sleep-quality" min="1" max="10" class="range" />
                                        <div class="flex justify-between text-xs px-2">
                                            <span>1</span>
                                            <span id="quality-display" class="font-bold">5</span>
                                            <span>10</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="divider">Notes</div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-semibold">Weekly Notes</span>
                                    </label>
                                    <textarea id="measurement-notes" class="textarea textarea-bordered" placeholder="Any observations about your week..."></textarea>
                                </div>

                                <div class="form-control mt-6">
                                    <button type="submit" class="btn btn-primary">Save Measurements</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Measurement History -->
                <div class="lg:col-span-1">
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title text-lg">Measurement History</h2>
                            <div id="measurement-history" class="space-y-2">
                                <p class="text-base-content/60 text-sm">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Progress Tracker -->
                    <div class="card bg-base-100 shadow-xl">
                        <div class="card-body">
                            <h2 class="card-title text-lg">Progress</h2>
                            <div class="space-y-3 text-sm">
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span>Weight</span>
                                        <span class="font-bold" id="weight-change">--</span>
                                    </div>
                                    <progress class="progress w-full" id="weight-progress"></progress>
                                </div>
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span>Body Fat</span>
                                        <span class="font-bold" id="fat-change">--</span>
                                    </div>
                                    <progress class="progress w-full" id="fat-progress"></progress>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>

        function initPage() {
            // Set week start date
            const weekStart = getWeekStart();
            document.getElementById('measurement-week').value = formatDate(weekStart);

            // Update display values on slider change
            document.getElementById('avg-energy').addEventListener('change', (e) => {
                document.getElementById('energy-display').textContent = e.target.value;
            });
            document.getElementById('sleep-quality').addEventListener('change', (e) => {
                document.getElementById('quality-display').textContent = e.target.value;
            });

            // Form submission
            document.getElementById('measurement-form').addEventListener('submit', saveMeasurements);

            // Load history
            loadMeasurementHistory();
        }

        async function saveMeasurements(e) {
            e.preventDefault();

            try {
                const measurementData = {
                    week_start: document.getElementById('measurement-week').value,
                    weight_kg: parseFloat(document.getElementById('weight').value) || null,
                    body_fat_pct: parseFloat(document.getElementById('body-fat-percent').value) || null,
                    waist_cm: parseFloat(document.getElementById('waist').value) || null,
                    sleep_avg_hrs: parseFloat(document.getElementById('avg-sleep').value) || null,
                    rhr_bpm: parseInt(document.getElementById('resting-hr').value) || null,
                    energy_level_avg: parseFloat(document.getElementById('avg-energy').value) || null,
                };

                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = true;
                button.textContent = 'Saving...';

                const result = await api.createWeeklyMeasurement(measurementData);
                showSuccess('Measurements saved successfully!');

                // Reset form
                document.getElementById('measurement-form').reset();
                const weekStart = getWeekStart();
                document.getElementById('measurement-week').value = formatDate(weekStart);

                // Reload history
                await loadMeasurementHistory();

                button.disabled = false;
                button.textContent = 'Save Measurements';
            } catch (error) {
                showError(error);
                e.target.querySelector('button[type="submit"]').disabled = false;
            }
        }

        async function loadMeasurementHistory() {
            try {
                const measurements = await api.listWeeklyMeasurements();
                const historyDiv = document.getElementById('measurement-history');
                
                if (measurements.length === 0) {
                    historyDiv.innerHTML = '<p class="text-base-content/60 text-sm">No measurements yet</p>';
                    return;
                }

                historyDiv.innerHTML = measurements.slice(0, 5).map(m => {
                    const weekStart = new Date(m.week_start);
                    const weekLabel = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    return `
                        <div class="bg-base-200 p-3 rounded-lg">
                            <div class="font-semibold text-sm">Week of ${weekLabel}</div>
                            <div class="text-xs text-base-content/70 mt-1">
                                ${m.weight_kg ? `Weight: ${m.weight_kg}kg<br>` : ''}
                                ${m.body_fat_pct ? `BF: ${m.body_fat_pct}%<br>` : ''}
                                ${m.sleep_avg_hrs ? `Sleep: ${m.sleep_avg_hrs}h` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                // Calculate changes
                if (measurements.length > 1) {
                    const latest = measurements[0];
                    const previous = measurements[1];
                    
                    if (latest.weight_kg && previous.weight_kg) {
                        const diff = (latest.weight_kg - previous.weight_kg).toFixed(1);
                        const sign = diff > 0 ? '+' : '';
                        document.getElementById('weight-change').textContent = `${sign}${diff} lbs`;
                    }
                    
                    if (latest.body_fat_pct && previous.body_fat_pct) {
                        const diff = (latest.body_fat_pct - previous.body_fat_pct).toFixed(1);
                        const sign = diff > 0 ? '+' : '';
                        document.getElementById('fat-change').textContent = `${sign}${diff}%`;
                    }
                }
            } catch (error) {
                console.error('Error loading measurements:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
