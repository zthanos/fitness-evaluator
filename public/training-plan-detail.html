<!DOCTYPE html>
<html lang="en" data-theme="light" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Plan Detail - Fitness Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Design Tokens -->
    <link rel="stylesheet" href="css/design-tokens.css">
    
    <!-- Navigation Sidebar Styles -->
    <link rel="stylesheet" href="css/navigation-sidebar.css">
</head>
<body class="bg-base-200 h-full">
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main id="main-content" class="main-content min-h-screen">
        <div class="p-6">
            <!-- Back Button -->
            <div class="mb-4">
                <a href="/training-plans.html" class="btn btn-ghost btn-sm gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back to Plans
                </a>
            </div>

            <!-- Plan Detail Container -->
            <div id="plan-detail-container">
                <div class="flex justify-center items-center py-8">
                    <span class="loading loading-spinner loading-lg"></span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/chart-config.js"></script>
    <script src="js/adherence-chart.js"></script>
    <script src="js/training-plan-detail.js"></script>
    
    <!-- Navigation Sidebar Script -->
    <script src="js/navigation-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize sidebar
            const sidebar = new NavigationSidebar('sidebar-container');
            
            // Get plan ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const planId = urlParams.get('id');
            
            if (!planId) {
                document.getElementById('plan-detail-container').innerHTML = `
                    <div class="alert alert-error">
                        <span>No plan ID provided</span>
                    </div>
                `;
                return;
            }
            
            // Initialize plan detail view
            const planDetail = new TrainingPlanDetail('plan-detail-container', planId);
            await planDetail.init();
        });
    </script>
</body>
</html>
