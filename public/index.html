<!DOCTYPE html>
<html lang="en" data-theme="light" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Platform</title>

  <!-- CDN styles & libraries (φορτώνονται πάντα) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Chart.js & Leaflet — φορτώνονται πάντα (χρησιμοποιούνται από πολλές σελίδες) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Design tokens & sidebar CSS -->
  <link rel="stylesheet" href="/css/design-tokens.css" />
  <link rel="stylesheet" href="/css/navigation-sidebar.css" />

  <style>
    #main-content { transition: opacity 150ms ease; }
  </style>
</head>

<body class="bg-base-200 h-full">
  <a href="#main-content" class="skip-to-main">Skip to main content</a>

  <!-- Sidebar — init μία φορά, παραμένει σε όλες τις σελίδες -->
  <div id="sidebar-container"></div>

  <!-- Εδώ κάνει render κάθε σελίδα -->
  <main id="main-content" class="main-content flex flex-col h-full overflow-hidden">
    <div class="flex items-center justify-center h-screen">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  </main>

  <!-- Toast notifications -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm"></div>

  <!--
    ΜΟΝΟ το app.js φορτώνεται εδώ — ως ES Module.
    Όλα τα υπόλοιπα scripts φορτώνονται lazy μέσα από το app.js
    με dynamic import() όταν χρειαστεί κάθε σελίδα.

    type="module" σημαίνει:
      ✓ Αυτόματο defer (δεν μπλοκάρει το HTML parsing)
      ✓ Strict mode
      ✓ Υποστηρίζει import/export
  -->
  <script type="module" src="/js/app.js"></script>
</body>

</html>
