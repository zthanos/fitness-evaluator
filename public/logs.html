<!DOCTYPE html>
<html lang="en" data-theme="light" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Logs - Fitness Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Design Tokens -->
    <link rel="stylesheet" href="css/design-tokens.css">
    
    <!-- Navigation Sidebar Styles -->
    <link rel="stylesheet" href="css/navigation-sidebar.css">
</head>
<body class="bg-base-200 h-full">
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main id="main-content" class="main-content h-screen flex flex-col">
        <div class="p-6 flex-1 flex flex-col overflow-hidden">
            <!-- Header with Add Button -->
            <div class="flex justify-between items-center mb-6 flex-shrink-0">
                <h1 class="text-4xl font-bold">📝 Daily Logs</h1>
                <button 
                    id="add-log-btn" 
                    class="btn btn-primary gap-2"
                    onclick="document.getElementById('log-form-modal').showModal()"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    Add Log Entry
                </button>
            </div>

            <!-- This Week Statistics (Full Width) -->
            <div class="card bg-base-100 shadow-xl mb-6 flex-shrink-0">
                <div class="card-body">
                    <h2 class="card-title">This Week</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-2">
                        <div class="stat">
                            <div class="stat-title">Avg Calories</div>
                            <div class="stat-value text-primary" id="avg-calories">--</div>
                            <div class="stat-desc">kcal per day</div>
                        </div>
                        <div class="stat">
                            <div class="stat-title">Avg Adherence</div>
                            <div class="stat-value text-secondary" id="avg-adherence">--</div>
                            <div class="stat-desc">out of 100</div>
                        </div>
                        <div class="stat">
                            <div class="stat-title">Avg Protein</div>
                            <div class="stat-value text-accent" id="avg-sleep">--</div>
                            <div class="stat-desc">grams per day</div>
                        </div>
                        <div class="stat">
                            <div class="stat-title">Entries</div>
                            <div class="stat-value" id="avg-energy">--</div>
                            <div class="stat-desc">logs this week</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- All Daily Logs (Fills remaining space with internal scroll) -->
            <div class="card bg-base-100 shadow-xl flex-1 flex flex-col overflow-hidden">
                <div class="card-body flex flex-col overflow-hidden">
                    <div class="flex-shrink-0">
                        <h2 class="card-title">All Daily Logs</h2>
                        <p class="text-sm text-base-content/70 mb-4">
                            Click on any field to edit it inline. Changes are saved immediately.
                        </p>
                    </div>
                    
                    <!-- Daily Log List Component with scroll -->
                    <div id="daily-log-list-container" class="flex-1 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Log Entry Modal -->
    <dialog id="log-form-modal" class="modal">
        <div class="modal-box max-w-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg mb-4">Add Today's Log</h3>
            
            <!-- Daily Log Form Component -->
            <div id="daily-log-form-container"></div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- Navigation Sidebar Script -->
    <script src="js/navigation-sidebar.js"></script>
    
    <!-- Daily Log Form Component -->
    <script src="js/daily-log-form.js"></script>
    
    <!-- Daily Log List Component -->
    <script src="js/daily-log-list.js"></script>
    
    <script>
        let dailyLogForm;
        let dailyLogList;

        function initPage() {
            // Initialize the daily log form component
            dailyLogForm = new DailyLogForm('daily-log-form-container');
            dailyLogForm.render();
            
            // Set up success callback to reload stats and list, then close modal
            dailyLogForm.onSuccess(() => {
                loadWeeklyStats();
                if (dailyLogList) {
                    dailyLogList.load();
                }
                // Close the modal
                const modal = document.getElementById('log-form-modal');
                if (modal) {
                    modal.close();
                }
            });

            // Initialize the daily log list component
            dailyLogList = new DailyLogList('daily-log-list-container');
            dailyLogList.load();

            // Load weekly statistics
            loadWeeklyStats();
        }

        async function loadWeeklyStats() {
            try {
                const response = await api.listDailyLogs();
                const logs = response.logs || response;
                
                if (!logs || logs.length === 0) {
                    return;
                }

                // Calculate statistics for logs from this week
                const weekStart = getWeekStart();
                const weekLogs = logs.filter(log => {
                    const logDate = new Date(log.log_date);
                    return logDate >= weekStart;
                });

                if (weekLogs.length > 0) {
                    let totalCalories = 0;
                    let totalAdherence = 0;
                    let totalProtein = 0;

                    weekLogs.forEach(log => {
                        if (log.calories_in) totalCalories += log.calories_in;
                        if (log.adherence_score !== null && log.adherence_score !== undefined) totalAdherence += log.adherence_score;
                        if (log.protein_g) totalProtein += log.protein_g;
                    });

                    document.getElementById('avg-calories').textContent = totalCalories > 0 ? Math.round(totalCalories / weekLogs.length) : '--';
                    document.getElementById('avg-adherence').textContent = totalAdherence > 0 ? (totalAdherence / weekLogs.length).toFixed(1) : '--';
                    document.getElementById('avg-sleep').textContent = totalProtein > 0 ? (totalProtein / weekLogs.length).toFixed(1) + 'g' : '--';
                    document.getElementById('avg-energy').textContent = weekLogs.length;
                }
            } catch (error) {
                console.error('Error loading weekly stats:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Initialize sidebar
            const sidebar = new NavigationSidebar('sidebar-container');
            
            initPage();
        });
    </script>
</body>
</html>
