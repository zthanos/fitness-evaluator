<div class="flex flex-col h-full p-6 gap-4 overflow-hidden">

    <!-- Header -->
    <div class="flex justify-between items-center flex-shrink-0">
        <h1 class="text-4xl font-bold">⚡ Activities</h1>
        <button id="sync-strava-btn" class="btn btn-primary gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">

            <!-- Filters — σταθερό ύψος -->
            <div id="activities-filters" class="flex-shrink-0"></div>

            <!-- Table — scroll μόνο εδώ -->
            <div id="activities-table" class="flex-1 overflow-y-auto min-h-0 mt-2">

                    <span class="loading loading-spinner loading-lg"></span>

            <div id="activities-pager" class="flex-shrink-0 pt-3 border-t border-base-200"></div>

        </div>
