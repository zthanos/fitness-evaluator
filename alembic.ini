# alembic.ini
# Alembic migration environment configuration

[alembic]
# Path to migration scripts - relative to the location of this ini file
script_location = alembic

# Prepend to sys.path - defaults to current working directory
prepend_sys_path = .

# Template for migration file names
# Available tokens: https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# file_template = %%(rev)s_%%(slug)s

# Example with date/time prefix:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Organize into date-based subdirectories (requires recursive_version_locations = true)
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# Timezone for rendering dates in migration files
# Requires tzdata library (install with: alembic[tz])
# timezone = 

# Max length for the "slug" field in migration names
# truncate_slug_length = 40

# Run environment during 'revision' command regardless of autogenerate
# revision_environment = false

# Allow .pyc and .pyo files without source .py as revisions
# sourceless = false

# Multiple version directories (colon-separated on Unix, semicolon on Windows)
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Path separator for splitting lists of file paths
# Valid values: :, ;, space, newline, os (uses os.pathsep)
path_separator = os

# Search source files recursively in version_locations directories
# recursive_version_locations = false

# Output encoding for revision files
# output_encoding = utf-8

# Database URL - consumed by env.py script
sqlalchemy.url = sqlite:///./fitness.db


[post_write_hooks]
# Scripts or Python functions run on newly generated revision scripts

# Format using Black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Lint and fix using Ruff
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Alternative: execute ruff binary from PATH
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console
qualname = 

[logger_sqlalchemy]
level = WARNING
handlers = 
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = 
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S