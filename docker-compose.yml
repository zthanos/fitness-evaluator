version: '3.8'

services:

  # ── PostgreSQL (fitness DB + keycloak DB) ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5460:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/02-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Keycloak (identity & access management) ───────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fitness-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: fitness-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # For GPU support (optional, requires nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Fitness API ───────────────────────────────────────────────────────────
  app:
    build: .
    container_name: fitness-app
    environment:
      DATABASE_URL: postgresql://fitness_user:fitness_password@postgres:5432/fitness
      OLLAMA_ENDPOINT: http://ollama:11434
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: fitness
      KEYCLOAK_CLIENT_ID: fitness-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    profiles:
      - full  # Only start app container in full profile; dev runs the app locally

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
