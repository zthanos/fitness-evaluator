version: '3.8'

services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: fitness-eval-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - fitness-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-eval-app
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: sqlite:///./data/fitness_eval.db
      
      # LLM Configuration - Ollama
      LM_STUDIO_ENDPOINT: http://ollama:11434/api
      LM_STUDIO_MODEL: mistral
      LLM_TYPE: ollama
      
      # Strava OAuth (from .env or environment)
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_REDIRECT_URI: http://localhost:8000/api/auth/strava/callback
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./public:/app/public
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  fitness-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
