# Docker Compose configuration for Fitness Evaluator
# Compose v2+ (no version field needed)

services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: fitness-eval-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g  # Prevent Ollama from starving other containers
    healthcheck:
      # Use the built-in Ollama CLI for health checking instead of curl
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-eval-app
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: sqlite:///./data/fitness_eval.db

      # LLM Configuration - Ollama (OpenAI-compatible /v1 endpoint)
      # Base URL should be host:port; client appends /v1/chat/completions
      OLLAMA_ENDPOINT: http://ollama:11434
      OLLAMA_MODEL: mistral
      LLM_TYPE: ollama

      # Strava OAuth (must be provided via .env or environment)
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: http://localhost:8000/api/auth/strava/callback

      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
    volumes:
      # Only mount runtime data - don't overwrite image code
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s  # Allow time for migrations and Ollama startup

networks:
  fitness-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local