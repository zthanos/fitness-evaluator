# Retrieval Policies Configuration
# Defines intent-specific retrieval strategies for the RAG system
# Each policy specifies how to retrieve data based on the classified query intent

# Intent: Recent Performance
# Use case: "How did I do this week?", "What were my recent workouts?"
recent_performance:
  days_back: 14  # Look back 14 days
  max_records: 20  # Limit to 20 records
  data_types:
    - activities
    - metrics
    - logs

# Intent: Trend Analysis
# Use case: "How has my training progressed?", "What are my trends?"
trend_analysis:
  days_back: 90  # Look back 90 days for trend analysis
  max_records: 20  # Limit to 20 records
  data_types:
    - activities
    - metrics

# Intent: Goal Progress
# Use case: "Am I on track for my goal?", "How close am I to my target?"
goal_progress:
  days_back: null  # All time - retrieve all relevant data
  max_records: 20  # Limit to 20 records
  data_types:
    - goals
    - activities

# Intent: Recovery Status
# Use case: "Am I recovered?", "Should I rest today?"
recovery_status:
  days_back: 7  # Look back 7 days for recovery assessment
  max_records: 20  # Limit to 20 records
  data_types:
    - activities
    - metrics

# Intent: Training Plan
# Use case: "What should I do next week?", "What's my upcoming schedule?"
training_plan:
  days_back: -7  # Look forward 7 days (negative = future)
  max_records: 20  # Limit to 20 records
  data_types:
    - goals
    - planned_activities

# Intent: Comparison
# Use case: "How does this compare to last month?", "Am I improving?"
comparison:
  days_back: 180  # Look back 180 days for comparison
  max_records: 40  # Higher limit for comparison (need more data points)
  data_types:
    - activities
    - metrics

# Intent: Activity List
# Use case: "Which are my longest rides?", "Show me my best runs", "List my activities"
activity_list:
  days_back: null  # All time — needed for "longest ever" style questions
  max_records: 30  # Return enough to cover ranking queries
  data_types:
    - activities

# Intent: Workout Analysis
# Use case: "How was my last ride?", "Analyse my recent workout", "How was my effort?"
workout_analysis:
  days_back: 14  # Focus on recent sessions
  max_records: 10
  data_types:
    - activities
    - metrics

# Intent: Recovery Check
# Use case: "Should I train today?", "Am I recovered?", "What's my ACWR?"
recovery_check:
  days_back: 14
  max_records: 20
  data_types:
    - activities
    - metrics

# Intent: Progress Check
# Use case: "Am I on track?", "How far to my goal?", "What's my fitness trend?"
progress_check:
  days_back: 90
  max_records: 30
  data_types:
    - activities
    - goals
    - metrics

# Intent: Plan Generation
# Use case: "Create a training plan", "What should I do this week?"
plan_generation:
  days_back: 30  # Recent history to inform the plan
  max_records: 20
  data_types:
    - activities
    - goals
    - metrics

# Intent: Performance Goal
# Use case: "Can I ride 70 km in 3 hours?", "Am I ready for a marathon?"
performance_goal:
  days_back: null   # All-time — needs full history for best comparable speed
  max_records: 20
  data_types:
    - activities

# Intent: Nutrition Check
# Use case: "How many calories did I burn?", "What should I eat after my ride?"
nutrition_check:
  days_back: 30
  max_records: 20
  data_types:
    - activities
    - metrics

# Intent: General
# Use case: Fallback for queries that don't match specific intents
general:
  days_back: 30  # Look back 30 days as default
  max_records: 20  # Limit to 20 records
  data_types:
    - activities
    - metrics
    - logs
    - goals
